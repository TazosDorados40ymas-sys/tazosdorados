<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  .cat-visual-icon { font-size: 22px; margin-bottom: 3px; }

  .upload-progress-bar { background: var(--navy-3); height: 6px; border-radius: 3px; overflow: hidden; margin-bottom: 4px; }

  .lightbox-header { padding: 14px 16px; padding-top: calc(14px + env(safe-area-inset-top)); display: flex; justify-content: space-between; align-items: center; color: var(--cream); z-index: 10; }
