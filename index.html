<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --navy: #0b1622; --navy-2: #142538; --navy-3: #1d3148;
    --cream: #f5ede0; --cream-2: #ebe0cc;
    --gold: #e5b94a; --gold-dark: #b8922f; --gold-deep: #8a6a1f;
    --red: #c84242; --red-dark: #8a2e2e; --green: #6ba96b; --green-dark: #4a8a4a;
    --text-muted: #8a9aaa;
    --line: rgba(229, 185, 74, 0.12); --line-soft: rgba(245, 237, 224, 0.08);
  }
  html, body { background: #000; font-family: 'DM Sans', -apple-system, sans-serif; color: var(--cream); min-height: 100vh; overscroll-behavior: none; }
  body { background: var(--navy); background-image: radial-gradient(circle at 15% 8%, rgba(229, 185, 74, 0.12) 0%, transparent 45%), radial-gradient(circle at 90% 85%, rgba(200, 66, 66, 0.08) 0%, transparent 50%); background-attachment: fixed; }
  body::before { content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 1000; opacity: 0.04; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
  .app { max-width: 430px; margin: 0 auto; min-height: 100vh; background: var(--navy); position: relative; padding-bottom: 88px; }
  .app-header { position: sticky; top: 0; z-index: 50; background: linear-gradient(180deg, var(--navy) 0%, var(--navy) 85%, rgba(11, 22, 34, 0.95) 100%); padding: 16px 20px 14px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid var(--line); backdrop-filter: blur(10px); }
  .team-badge { width: 54px; height: 54px; border-radius: 50%; background: var(--navy); border: 2px solid var(--gold); display: grid; place-items: center; flex-shrink: 0; position: relative; box-shadow: 0 0 0 2px var(--navy-2), 0 0 14px rgba(229, 185, 74, 0.25); }
  .team-badge-text { font-family: 'Kaushan Script', cursive; font-size: 16px; color: var(--cream); line-height: 0.9; text-align: center; transform: rotate(-4deg); letter-spacing: -0.5px; }
  .team-badge-text small { display: block; font-family: 'Allura', cursive; font-size: 11px; color: var(--gold); margin-top: -2px; }
  .team-info { flex: 1; min-width: 0; }
  .team-info h1 { font-family: 'Kaushan Script', cursive; font-size: 26px; color: var(--cream); line-height: 0.95; transform: rotate(-2deg); display: inline-block; }
  .team-info .dorados { font-family: 'Allura', cursive; font-size: 18px; color: var(--gold); display: block; margin-top: -4px; margin-left: 16px; line-height: 1; }
  .team-info p { font-size: 9px; color: var(--cream-2); opacity: 0.55; margin-top: 4px; letter-spacing: 2px; text-transform: uppercase; }
  .admin-btn { background: transparent; border: 1px solid var(--line); color: var(--text-muted); width: 38px; height: 38px; border-radius: 50%; font-size: 14px; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
  .admin-btn.active { background: var(--gold); color: var(--navy); border-color: var(--gold); box-shadow: 0 0 12px rgba(229, 185, 74, 0.4); }
  .screen { display: none; padding: 18px 20px 24px; animation: fadeIn 0.3s; }
  .screen.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 2.5px; color: var(--gold); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .section-title::before { content: ''; width: 6px; height: 6px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 8px var(--gold); }

  .greeting-bar { background: linear-gradient(90deg, rgba(229, 185, 74, 0.12) 0%, rgba(229, 185, 74, 0.03) 100%); border-left: 3px solid var(--gold); padding: 12px 14px; border-radius: 0 10px 10px 0; margin-bottom: 20px; display: flex; gap: 10px; align-items: flex-start; }

  .next-game::before { content: 'PRÓXIMO'; position: absolute; top: 14px; right: 16px; font-family: 'Bebas Neue', sans-serif; font-size: 11px; letter-spacing: 2.5px; color: var(--gold); background: rgba(229, 185, 74, 0.1); padding: 4px 8px; border-radius: 4px; }
  .game-date { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--gold); margin-bottom: 6px; letter-spacing: 1px; }

  .game-meta { display: flex; gap: 18px; padding-top: 14px; border-top: 1px solid var(--line); font-size: 12px; color: var(--cream-2); flex-wrap: wrap; }

  .identity-motto { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 4px; color: var(--gold); line-height: 1; margin-bottom: 6px; }
  .identity-sub { font-family: 'Caveat', cursive; font-size: 17px; color: var(--cream-2); line-height: 1.3; }
  .list-card { background: var(--navy-2); border: 1px solid var(--line-soft); border-radius: 14px; overflow: hidden; margin-bottom: 20px; }
  .list-row { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--line-soft); }
  .list-row:last-child { border-bottom: none; }
  .list-row-icon { width: 34px; height: 34px; border-radius: 10px; display: grid; place-items: center; font-size: 14px; flex-shrink: 0; font-weight: bold; }
  .list-row-icon.in { background: rgba(107, 169, 107, 0.15); color: var(--green); }
  .list-row-icon.out { background: rgba(200, 66, 66, 0.15); color: var(--red); }
  .list-row-body { flex: 1; min-width: 0; }
  .list-row-title { font-size: 14px; color: var(--cream); font-weight: 500; }
  .list-row-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .list-row-value { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 14px; }
  .list-row-value.pos { color: var(--green); }
  .list-row-value.neg { color: var(--red); }
  .balance-hero { background: linear-gradient(135deg, var(--gold-deep) 0%, var(--navy-3) 100%); border: 1px solid var(--gold-dark); border-radius: 18px; padding: 22px; margin-bottom: 20px; position: relative; overflow: hidden; }
  .balance-label { font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; font-size: 11px; color: var(--cream-2); opacity: 0.85; }
  .balance-amount { font-family: 'Bebas Neue', sans-serif; font-size: 52px; letter-spacing: 1px; color: var(--gold); line-height: 1; margin: 6px 0 12px; text-shadow: 0 2px 12px rgba(229, 185, 74, 0.3); }
  .balance-amount .currency { font-size: 22px; opacity: 0.8; vertical-align: top; margin-right: 4px; }
  .balance-quote { font-family: 'Caveat', cursive; font-size: 15px; color: var(--cream-2); margin-bottom: 12px; font-style: italic; }
  .balance-footer { display: flex; gap: 18px; font-size: 11px; color: var(--cream-2); opacity: 0.9; flex-wrap: wrap; }

  .player-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--navy-3); display: grid; place-items: center; font-family: 'Bebas Neue', sans-serif; color: var(--gold); font-size: 14px; flex-shrink: 0; border: 1px solid var(--gold-deep); overflow: hidden; background-size: cover; background-position: center; }
  .player-debt-body { flex: 1; min-width: 0; }

  .debt-pill.bad { background: rgba(200, 66, 66, 0.15); color: var(--red); }
  .roster-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .player-card { background: linear-gradient(180deg, var(--navy-2) 0%, var(--navy-3) 100%); border: 1px solid var(--gold-deep); border-radius: 14px; padding: 14px 12px; text-align: center; position: relative; overflow: hidden; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
  .player-card:active { transform: scale(0.97); }
  .player-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  .player-card-avatar { width: 56px; height: 56px; border-radius: 50%; margin: 0 auto 8px; background: var(--navy); border: 2px solid var(--gold); display: grid; place-items: center; font-family: 'Bebas Neue', sans-serif; color: var(--gold); font-size: 20px; background-size: cover; background-position: center; overflow: hidden; }
  .player-number { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--gold); line-height: 1; letter-spacing: 1px; text-shadow: 0 2px 8px rgba(229, 185, 74, 0.3); }
  .player-card-name { font-size: 13px; font-weight: 600; margin: 6px 0 2px; }

  .player-card .inactive-badge { position: absolute; top: 6px; right: 6px; background: var(--red-dark); color: var(--cream); font-family: 'Bebas Neue', sans-serif; font-size: 9px; letter-spacing: 1.5px; padding: 3px 7px; border-radius: 4px; z-index: 1; }
  .fab { position: fixed; bottom: 100px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%); color: var(--navy); border: none; font-size: 28px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 20px rgba(229, 185, 74, 0.5); z-index: 55; display: none; align-items: center; justify-content: center; }
  @media (min-width: 430px) { .fab { right: calc(50% - 215px + 20px); } }
  /* FAB visible en pantallas Roster y Calendario (solo modo tesorero) */

  body.tesorero-mode.screen-calendario .fab { display: flex; }
  .cal-game { background: var(--navy-2); border: 1px solid var(--line-soft); border-radius: 14px; padding: 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: transform 0.15s, background 0.15s; }
